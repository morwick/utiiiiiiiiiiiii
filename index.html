<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to 7 April 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            /* Background putih sesuai permintaan */
            font-family: 'Inter', sans-serif;
            color: #333333;
        }

        .countdown-wrapper {
            text-align: center;
            padding: 3rem 4rem;
            border-radius: 24px;
            /* Container putih bersih dengan bayangan sangat lembut untuk kesan premium */
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transform: translateY(0);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .countdown-wrapper:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), 0 2px 5px rgba(0, 0, 0, 0.03);
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            color: #666666;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .timer {
            display: flex;
            gap: 2.5rem;
            justify-content: center;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 90px;
        }

        .number {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.8rem;
            /* Gradient elegan pada angka */
            background: linear-gradient(135deg, #111111 0%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.02);
        }

        .label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        @media (max-width: 768px) {
            .timer {
                gap: 1.5rem;
            }

            .number {
                font-size: 3.5rem;
            }

            .countdown-wrapper {
                padding: 2rem 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .timer {
                gap: 1rem;
            }

            .number {
                font-size: 2.5rem;
            }

            .time-box {
                min-width: 60px;
            }

            h1 {
                font-size: 1rem;
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="countdown-wrapper">
        <h1>Menuju 7 April 2026</h1>
        <div class="timer">
            <div class="time-box">
                <div class="number" id="days">00</div>
                <div class="label">Hari</div>
            </div>
            <div class="time-box">
                <div class="number" id="hours">00</div>
                <div class="label">Jam</div>
            </div>
            <div class="time-box">
                <div class="number" id="minutes">00</div>
                <div class="label">Menit</div>
            </div>
            <div class="time-box">
                <div class="number" id="seconds">00</div>
                <div class="label">Detik</div>
            </div>
        </div>
    </div>

    <script>
        // Set target date ke 7 April 2026 00:00:00
        const targetDate = new Date('2026-04-07T00:00:00').getTime();

        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                daysEl.innerText = "00";
                hoursEl.innerText = "00";
                minutesEl.innerText = "00";
                secondsEl.innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Format penambahan angka 0 di depan jika kurang dari 10
            daysEl.innerText = days < 10 ? '0' + days : days;
            hoursEl.innerText = hours < 10 ? '0' + hours : hours;
            minutesEl.innerText = minutes < 10 ? '0' + minutes : minutes;
            secondsEl.innerText = seconds < 10 ? '0' + seconds : seconds;
        }

        // Update timer setiap 1 detik
        setInterval(updateCountdown, 1000);

        // Panggilan awal agar tidak ada delay saat halaman di-load
        updateCountdown();
    </script>
</body>

</html>
